<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Trabalho Escolar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .caixa {
            border: 1px solid #000000;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.2);
            padding: 20px;
            max-width: 400px;
            margin: 20px auto;
        }

        .campo {
            margin-bottom: 15px;
        }

        .campo label {
            display: block;
            margin-bottom: 5px;
        }

        .campo input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        .btn-colorido {
            background-color: #0000ff;
            color: #ffffff;
            padding: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .btn-colorido:hover {
            background-color: #000099;
        }

        /* Seção de avisos simples e mais organizada */
        .pagina-avisos {
            max-width: 500px;
            margin: 40px auto;
        }

        .aviso {
            border-bottom: 1px solid #cccccc;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .aviso h2 {
            color: #cc0000;
            margin-bottom: 8px;
            font-size: 20px;
        }

        .aviso p {
            line-height: 1.6;
            font-size: 16px;
            color: #000000;
            margin: 0;
        }
    </style>
</head>
<body>

    <h1>Cadastro de Aluno</h1>

    <div class="caixa">
        <form>
            <div class="campo">
                <label for="nome">Nome:</label>
                <input type="text" id="nome">
            </div>
            
            <div class="campo">
                <label for="idade">Idade:</label>
                <input type="text" id="idade">
            </div>

            <button type="submit" class="btn-colorido">Salvar</button>
        </form>
    </div>

    <div class="pagina-avisos">
        <h1>Avisos</h1>

        <div class="aviso">
            <h2>Aviso 1</h2>
            <p>As aulas começam na próxima semana. Tragam o material necessário.</p>
        </div>

        <div class="aviso">
            <h2>Aviso 2</h2>
            <p>A entrega do trabalho deve ser feita impressa na secretaria.</p>
        </div>
    </div>

</body>
</html>
